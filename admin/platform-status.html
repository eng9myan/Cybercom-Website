<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform Status — CyberCom Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --orange:#ed6c00;--cyan:#59c3e1;--dark:#0c0c0e;--dark2:#131317;
      --dark3:#1a1a20;--dark4:#222229;--text:#f0f0f0;--muted:#7a7a8c;
      --green:#22c55e;--red:#ef4444;--yellow:#eab308;--border:rgba(237,108,0,.14);
    }
    html{scroll-behavior:smooth}
    body{font-family:'Lato',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--dark)}
    ::-webkit-scrollbar-thumb{background:var(--orange);border-radius:2px}

    /* ── Header ── */
    header{
      background:var(--dark2);border-bottom:1px solid var(--border);
      padding:1.2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:10
    }
    .header-brand{display:flex;align-items:center;gap:.9rem}
    .header-brand svg{height:34px;width:auto}
    .header-title{font-size:.75rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    .header-actions{display:flex;align-items:center;gap:1.2rem}
    #refresh-btn{
      background:rgba(237,108,0,.1);border:1px solid rgba(237,108,0,.3);
      color:var(--orange);padding:.45rem 1.1rem;border-radius:4px;
      font-family:'Lato',sans-serif;font-weight:700;font-size:.75rem;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
      transition:background .2s
    }
    #refresh-btn:hover{background:rgba(237,108,0,.2)}
    #last-checked{font-size:.75rem;color:var(--muted)}

    /* ── Layout ── */
    .container{max-width:1100px;margin:0 auto;padding:2.5rem}

    /* ── Overall badge ── */
    .overall-status{
      display:flex;align-items:center;gap:1.1rem;
      padding:1.4rem 2rem;border-radius:10px;margin-bottom:2.5rem;
      border:1px solid;
    }
    .overall-status.all-ok{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.25)}
    .overall-status.degraded{background:rgba(234,179,8,.06);border-color:rgba(234,179,8,.25)}
    .overall-status.outage{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.25)}
    .overall-pulse{width:12px;height:12px;border-radius:50%;animation:pulseDot 2s infinite;flex-shrink:0}
    .all-ok .overall-pulse{background:var(--green);box-shadow:0 0 12px var(--green)}
    .degraded .overall-pulse{background:var(--yellow);box-shadow:0 0 12px var(--yellow)}
    .outage .overall-pulse{background:var(--red);box-shadow:0 0 12px var(--red)}
    .overall-text h2{font-size:1.1rem;font-weight:900;letter-spacing:-.01em}
    .overall-text p{font-size:.83rem;color:var(--muted);margin-top:.2rem}

    /* ── Services grid ── */
    .services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin-bottom:3rem}

    .service-card{
      background:var(--dark2);border:1px solid rgba(255,255,255,.05);
      border-radius:10px;padding:1.6rem;transition:border-color .3s
    }
    .service-card.status-ok{border-left:3px solid var(--green)}
    .service-card.status-degraded{border-left:3px solid var(--yellow)}
    .service-card.status-down{border-left:3px solid var(--red)}
    .service-card.status-checking{border-left:3px solid var(--muted)}

    .sc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
    .sc-name{font-size:1rem;font-weight:900;letter-spacing:-.01em}
    .sc-desc{font-size:.78rem;color:var(--muted);margin-top:.2rem}
    .sc-badge{
      display:inline-flex;align-items:center;gap:.35rem;
      padding:.25rem .7rem;border-radius:20px;
      font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      flex-shrink:0;
    }
    .badge-ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .badge-degraded{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.25)}
    .badge-down{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
    .badge-checking{background:rgba(122,122,140,.1);color:var(--muted);border:1px solid rgba(122,122,140,.2)}

    .sc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.8rem}
    .sc-metric{background:var(--dark3);border-radius:6px;padding:.7rem}
    .sc-metric-val{font-family:'Source Code Pro',monospace;font-size:.95rem;font-weight:600;color:var(--text)}
    .sc-metric-label{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.15rem}

    .sc-url{
      display:flex;align-items:center;gap:.4rem;margin-top:1rem;
      font-family:'Source Code Pro',monospace;font-size:.7rem;color:var(--muted);
      word-break:break-all
    }

    /* ── Incidents ── */
    .incidents-section{margin-bottom:2rem}
    .section-label{
      font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
      color:var(--orange);margin-bottom:1rem
    }
    .no-incidents{
      padding:1.5rem;background:var(--dark2);border-radius:8px;
      border:1px solid rgba(34,197,94,.15);text-align:center;
      font-size:.88rem;color:var(--muted)
    }

    /* ── History ── */
    .uptime-bar{display:flex;gap:2px;margin-top:.6rem}
    .uptime-day{flex:1;height:28px;border-radius:2px;background:var(--dark3);transition:background .3s}
    .uptime-day.ok{background:rgba(34,197,94,.5)}
    .uptime-day.degraded{background:rgba(234,179,8,.5)}
    .uptime-day.down{background:rgba(239,68,68,.5)}

    /* ── Footer ── */
    .admin-footer{
      text-align:center;padding:2rem;border-top:1px solid var(--border);
      font-size:.75rem;color:var(--muted);margin-top:2rem
    }

    @keyframes pulseDot{
      0%,100%{opacity:1}
      50%{opacity:.4}
    }
    @keyframes spin{
      to{transform:rotate(360deg)}
    }
    .spin{animation:spin .8s linear infinite}

    @media(max-width:640px){
      .services-grid{grid-template-columns:1fr}
      header{padding:1rem 1.2rem}
      .container{padding:1.5rem 1rem}
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <svg viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M25 5 A17 17 0 1 0 25 35" stroke="#ed6c00" stroke-width="5" fill="none" stroke-linecap="round"/>
      <ellipse cx="25.5" cy="35" rx="3.5" ry="4.5" fill="#59c3e1" transform="rotate(-15,25.5,35)"/>
      <text x="46" y="24" font-family="Lato,sans-serif" font-weight="900" font-size="14" fill="#ffffff" letter-spacing="2">CYBERCOM</text>
      <text x="47" y="33" font-family="sans-serif" font-weight="400" font-size="6" fill="#666" letter-spacing="3">REVOLUTION</text>
    </svg>
    <div class="header-title">Platform Status</div>
  </div>
  <div class="header-actions">
    <span id="last-checked">Checking…</span>
    <button id="refresh-btn" onclick="runHealthChecks()">↻ Refresh</button>
  </div>
</header>

<div class="container">

  <!-- Overall Status -->
  <div class="overall-status checking" id="overall-status">
    <div class="overall-pulse"></div>
    <div class="overall-text">
      <h2 id="overall-title">Checking service health…</h2>
      <p id="overall-desc">Pinging all endpoints</p>
    </div>
  </div>

  <!-- Services Grid -->
  <div class="section-label">Platform Services</div>
  <div class="services-grid" id="services-grid">
    <!-- populated by JS -->
  </div>

  <!-- Active Incidents -->
  <div class="incidents-section">
    <div class="section-label">Active Incidents</div>
    <div class="no-incidents" id="incidents-panel">
      ✓ No active incidents. All systems operating normally.
    </div>
  </div>

  <!-- 30-day uptime history placeholder -->
  <div>
    <div class="section-label">30-Day Uptime History</div>
    <div class="uptime-bar" id="uptime-bar">
      <!-- filled by JS -->
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:.4rem">
      <span>30 days ago</span><span>Today</span>
    </div>
  </div>

</div>

<div class="admin-footer">
  CyberCom Revolution — Internal Admin &nbsp;|&nbsp; Auto-refreshes every 30s &nbsp;|&nbsp; All times UTC
</div>

<script>
  /* ── Service definitions ───────────────────────────────────────────────── */
  const SERVICES = [
    {
      id: 'cymed',
      name: 'CyMed',
      desc: 'Healthcare Platform (P3.1–P3.9)',
      url: window.CYMED_HEALTH_URL || 'https://api.cy-com.com/cymed/health/',
      docs: 'CyMed — Clinical, Pharmacy, RCM, Population Health',
      icon: '🏥',
    },
    {
      id: 'cycom',
      name: 'CyCom',
      desc: 'Commerce & ERP Platform',
      url: window.CYCOM_HEALTH_URL || 'https://api.cy-com.com/cycom/health/',
      docs: 'CyCom — GL, AP, AR, Treasury, Procurement',
      icon: '🏢',
    },
    {
      id: 'cygov',
      name: 'CyGov',
      desc: 'Government Digital Platform',
      url: window.CYGOV_HEALTH_URL || 'https://api.cy-com.com/cygov/health/',
      docs: 'CyGov — Identity, Licensing, Citizen Services, Registries',
      icon: '🏛️',
    },
    {
      id: 'cyidentity',
      name: 'CyIdentity',
      desc: 'IAM — OAuth 2.1 / OIDC / MFA (P2.1)',
      url: window.CYIDENTITY_HEALTH_URL || 'https://identity.cy-com.com/health/',
      docs: 'OAuth 2.1, OpenID Connect, PKCE, MFA, Passkeys',
      icon: '🔐',
    },
    {
      id: 'cyai',
      name: 'CyAI',
      desc: 'AI Engine (P2.8)',
      url: window.CYAI_HEALTH_URL || 'https://api.cy-com.com/cyai/health/',
      docs: 'Disease Forecasting, Population Risk, Clinical Advisory',
      icon: '🤖',
    },
    {
      id: 'cydata',
      name: 'CyData',
      desc: 'Data Platform & Storage (P2.7)',
      url: window.CYDATA_HEALTH_URL || 'https://api.cy-com.com/cydata/health/',
      docs: 'File Storage, Data Lake, Analytics Pipeline',
      icon: '🗄️',
    },
    {
      id: 'cyintegrationhub',
      name: 'CyIntegrationHub',
      desc: 'Integration Bus (P2.6)',
      url: window.CYINTEGRATIONHUB_HEALTH_URL || 'https://api.cy-com.com/hub/health/',
      docs: 'Kafka Outbox, Cross-service Events, External APIs',
      icon: '🔗',
    },
  ];

  /* ── State ─────────────────────────────────────────────────────────────── */
  const state = {};
  SERVICES.forEach(s => {
    state[s.id] = {
      status: 'checking',
      latencyMs: null,
      checkedAt: null,
      history: Array(30).fill('unknown'),
    };
  });

  /* ── Health check ───────────────────────────────────────────────────────── */
  async function checkService(service) {
    const start = performance.now();
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      const resp = await fetch(service.url, {
        method: 'GET',
        signal: controller.signal,
        mode: 'cors',
        cache: 'no-store',
      });
      clearTimeout(timer);
      const latency = Math.round(performance.now() - start);
      return {
        status: resp.ok ? 'ok' : (resp.status >= 500 ? 'down' : 'degraded'),
        latencyMs: latency,
        httpStatus: resp.status,
      };
    } catch (err) {
      const latency = Math.round(performance.now() - start);
      if (err.name === 'AbortError') {
        return { status: 'degraded', latencyMs: latency, httpStatus: 0, error: 'Timeout' };
      }
      return { status: 'down', latencyMs: latency, httpStatus: 0, error: err.message };
    }
  }

  async function runHealthChecks() {
    document.getElementById('last-checked').textContent = 'Checking…';
    document.getElementById('overall-status').className = 'overall-status checking';
    document.getElementById('overall-title').textContent = 'Checking service health…';
    document.getElementById('overall-desc').textContent = 'Pinging all endpoints';

    const results = await Promise.allSettled(
      SERVICES.map(s => checkService(s))
    );

    let okCount = 0;
    let downCount = 0;
    let degradedCount = 0;

    results.forEach((result, i) => {
      const service = SERVICES[i];
      if (!service) return;
      const data = result.status === 'fulfilled' ? result.value : { status: 'down', latencyMs: null };
      state[service.id] = {
        ...state[service.id],
        status: data.status,
        latencyMs: data.latencyMs,
        checkedAt: new Date().toISOString(),
      };
      // shift history
      const hist = state[service.id].history;
      hist.shift();
      hist.push(data.status);

      if (data.status === 'ok') okCount++;
      else if (data.status === 'down') downCount++;
      else degradedCount++;
    });

    const now = new Date();
    document.getElementById('last-checked').textContent =
      'Last checked: ' + now.toLocaleTimeString('en-GB', { hour12: false, timeZone: 'UTC' }) + ' UTC';

    // Overall status
    const overallEl = document.getElementById('overall-status');
    const titleEl = document.getElementById('overall-title');
    const descEl = document.getElementById('overall-desc');
    if (downCount > 0) {
      overallEl.className = 'overall-status outage';
      titleEl.textContent = `${downCount} service${downCount > 1 ? 's' : ''} experiencing an outage`;
      descEl.textContent = `${okCount} operational · ${degradedCount} degraded · ${downCount} down`;
    } else if (degradedCount > 0) {
      overallEl.className = 'overall-status degraded';
      titleEl.textContent = `${degradedCount} service${degradedCount > 1 ? 's' : ''} experiencing degraded performance`;
      descEl.textContent = `${okCount} operational · ${degradedCount} degraded`;
    } else {
      overallEl.className = 'overall-status all-ok';
      titleEl.textContent = 'All systems operational';
      descEl.textContent = `All ${okCount} services responding normally`;
    }

    renderCards();
    renderUptimeBar();
  }

  /* ── Render ─────────────────────────────────────────────────────────────── */
  function statusBadge(status) {
    if (status === 'ok') return '<span class="sc-badge badge-ok">● Operational</span>';
    if (status === 'degraded') return '<span class="sc-badge badge-degraded">◐ Degraded</span>';
    if (status === 'down') return '<span class="sc-badge badge-down">● Outage</span>';
    return '<span class="sc-badge badge-checking">○ Checking</span>';
  }

  function renderCards() {
    const grid = document.getElementById('services-grid');
    grid.innerHTML = SERVICES.map(service => {
      const s = state[service.id];
      const latency = s.latencyMs !== null ? s.latencyMs + ' ms' : '—';
      const uptime = calcUptime(s.history);
      return `
        <div class="service-card status-${s.status}">
          <div class="sc-header">
            <div>
              <div class="sc-name">${service.icon} ${service.name}</div>
              <div class="sc-desc">${service.desc}</div>
            </div>
            ${statusBadge(s.status)}
          </div>
          <div class="sc-metrics">
            <div class="sc-metric">
              <div class="sc-metric-val">${latency}</div>
              <div class="sc-metric-label">Latency</div>
            </div>
            <div class="sc-metric">
              <div class="sc-metric-val">${uptime}</div>
              <div class="sc-metric-label">30d Uptime</div>
            </div>
          </div>
          <div class="sc-url">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            ${service.url}
          </div>
        </div>`;
    }).join('');
  }

  function calcUptime(history) {
    const known = history.filter(h => h !== 'unknown');
    if (!known.length) return '—';
    const up = known.filter(h => h === 'ok').length;
    return ((up / known.length) * 100).toFixed(1) + '%';
  }

  function renderUptimeBar() {
    const bar = document.getElementById('uptime-bar');
    const allHistory = SERVICES.map(s => state[s.id].history);
    const combined = [];
    for (let i = 0; i < 30; i++) {
      const dayStatuses = allHistory.map(h => h[i] || 'unknown');
      if (dayStatuses.includes('down')) combined.push('down');
      else if (dayStatuses.includes('degraded')) combined.push('degraded');
      else if (dayStatuses.every(s => s === 'ok')) combined.push('ok');
      else combined.push('unknown');
    }
    bar.innerHTML = combined.map(s => `<div class="uptime-day ${s}" title="${s}"></div>`).join('');
  }

  /* ── Auto-refresh ────────────────────────────────────────────────────────── */
  const REFRESH_MS = window.STATUS_REFRESH_INTERVAL || 30000;

  // Initial render with empty cards
  renderCards();
  renderUptimeBar();

  // Run checks immediately
  runHealthChecks();

  // Schedule refresh
  setInterval(runHealthChecks, REFRESH_MS);
</script>

</body>
</html>
