# Nginx config for cy-com.com — CyberCom Revolution Website
# Includes: API proxy, admin routes, auth callback, portal redirects
# Place at: /etc/nginx/sites-available/cy-com.com
# Symlink: sudo ln -s /etc/nginx/sites-available/cy-com.com /etc/nginx/sites-enabled/

# ── Redirect bare HTTP → HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cy-com.com www.cy-com.com;
    return 301 https://www.cy-com.com$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cy-com.com www.cy-com.com;

    root /var/www/cy-com.com;
    index index.html;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cy-com.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.cy-com.com https://identity.cy-com.com; frame-ancestors 'none';" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # ── API proxy → CyberCom Platform backend ───────────────────────────────
    location /api/ {
        proxy_pass https://api.cy-com.com/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # CORS for API responses
        add_header Access-Control-Allow-Origin "https://cy-com.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://cy-com.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── OAuth callback ────────────────────────────────────────────────────────
    location /auth/callback {
        try_files /auth/callback.html =404;
    }

    # ── Portal login entry points ────────────────────────────────────────────
    location /login/portal {
        try_files /portals/portal-login.html =404;
    }

    location /login/health {
        try_files /portals/health-login.html =404;
    }

    location /login/provider {
        try_files /portals/provider-login.html =404;
    }

    # ── Admin routes (restrict to internal IPs in production) ────────────────
    location /admin/ {
        # Uncomment and configure in production:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;

        try_files $uri $uri/ $uri.html =404;

        # No caching for admin pages
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── Platform status dashboard ────────────────────────────────────────────
    location /admin/platform-status {
        try_files /admin/platform-status.html =404;
        add_header Cache-Control "no-store" always;
    }

    # ── Static assets (compiled SDK bundles) ────────────────────────────────
    location /dist/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── General static assets ────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── HTML pages — no cache ────────────────────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # ── Main SPA / static routing ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Certbot ACME challenge ────────────────────────────────────────────────
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/certbot;
    }
}

# ── Redirect portal.cy-com.com → portal login ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.cy-com.com;

    ssl_certificate     /etc/letsencrypt/live/cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cy-com.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 302 https://www.cy-com.com/login/portal$request_uri;
}

# ── Redirect health.cy-com.com → health login ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name health.cy-com.com;

    ssl_certificate     /etc/letsencrypt/live/cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cy-com.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 302 https://www.cy-com.com/login/health$request_uri;
}

# ── Redirect provider.cy-com.com → provider login ───────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name provider.cy-com.com;

    ssl_certificate     /etc/letsencrypt/live/cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cy-com.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 302 https://www.cy-com.com/login/provider$request_uri;
}
