# Nginx config for cy-com.com — CyberCom Revolution Website
# Place this file at: /etc/nginx/sites-available/cy-com.com
# Then symlink: sudo ln -s /etc/nginx/sites-available/cy-com.com /etc/nginx/sites-enabled/

# Redirect bare domain → www
server {
    listen 80;
    listen [::]:80;
    server_name cy-com.com;
    return 301 https://www.cy-com.com$request_uri;
}

# Redirect www HTTP → HTTPS (Certbot will manage the HTTPS blocks after SSL setup)
server {
    listen 80;
    listen [::]:80;
    server_name www.cy-com.com;

    root /var/www/cy-com.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/javascript;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(html|css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Certbot challenge (used during SSL setup)
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/certbot;
    }
}
