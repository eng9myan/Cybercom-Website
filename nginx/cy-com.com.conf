# CyberCom website reverse proxy. The certificate named www.cy-com.com must
# contain both www.cy-com.com and cy-com.com.

# Redirect unmapped subdomains back to main site (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name portal.cy-com.com docs.cy-com.com partners.cy-com.com;
    return 301 https://www.cy-com.com$request_uri;
}

# Redirect unmapped subdomains back to main site (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.cy-com.com docs.cy-com.com partners.cy-com.com;

    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.cy-com.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name cy-com.com www.cy-com.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://www.cy-com.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cy-com.com;

    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.cy-com.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cy-com.com;

    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
