# CyberCom Platform Nginx Configuration
# Handles routing for Corporate Website, Portals, Docs, Partners, ERP, and CyMed Clinical Portals

# HTTP redirection for main domains and subdomains to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cy-com.com www.cy-com.com portal.cy-com.com docs.cy-com.com partners.cy-com.com health.cy-com.com provider.cy-com.com cyshop.cy-com.com cymed.cy-com.com clinic.cy-com.com hospital.cy-com.com lab.cy-com.com imaging.cy-com.com pharmacy.cy-com.com api.cy-com.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect root cy-com.com to www.cy-com.com (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cy-com.com;

    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.cy-com.com$request_uri;
}

# www.cy-com.com (HTTPS) — Marketing Site & ERP Routing
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cy-com.com;

    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Route /erp/ and /erp to the local CyCom ERP Next.js Frontend (port 3005)
    location /erp/ {
        proxy_pass http://127.0.0.1:3005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /erp {
        return 301 $scheme://$host$request_uri/;
    }

    # Route /api/ directly to the CyberCom Platform API Backend (port 8010)
    location /api/ {
        proxy_pass http://127.0.0.1:8010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # Static assets fallback for Next.js Website
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Corporate Website Next.js App (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

