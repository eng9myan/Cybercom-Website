name: cybercom-website

services:
  web:
    image: cybercom-website:${CYBERCOM_RELEASE:-latest}
    container_name: cybercom-website
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      APP_RELEASE: ${CYBERCOM_RELEASE:-unknown}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
